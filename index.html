<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Seven Months</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cover-bg: #1a1412;
            --gold: #d4a391;
            --page-bg: #fffcf9;
            --text-dark: #3d302d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            height: 100dvh;
            background: #0f0a09;
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        .bg-particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1412 0%, #000 100%);
            z-index: -2;
        }

        #bg-flow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .flow-item {
            position: absolute;
            color: rgba(212, 163, 145, 0.45); 
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            white-space: nowrap;
            user-select: none;
            will-change: transform;
            font-weight: 600;
        }

        .screen {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
            transition: opacity 0.6s ease;
        }

        .hidden { opacity: 0; pointer-events: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 40px 30px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 22px;
            background: #fff;
            color: #000;
            outline: none;
        }

        .btn-entry {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: var(--gold);
            color: white;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
        }

        .book-wrapper {
            width: 100%;
            max-width: 380px;
            height: 85dvh;
            position: relative;
        }

        .page {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 20px;
            padding: 40px 25px;
            display: none;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            background: var(--page-bg);
            color: var(--text-dark);
        }

        .page.active { display: flex; animation: pageIn 0.5s ease-out; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .page-cover {
            background: var(--cover-bg);
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--gold);
            justify-content: center; align-items: center; text-align: center;
            border: 1px solid rgba(212, 163, 145, 0.3);
        }
        
        .gold-embossing {
            border: 1px solid var(--gold);
            padding: 40px 15px;
            width: 90%; height: 90%;
            display: flex; flex-direction: column; justify-content: center;
            border-radius: 10px;
        }

        .text-box {
            font-size: 18px;
            line-height: 1.5;
            font-style: italic;
            flex-grow: 1;
            display: flex; flex-direction: column; justify-content: center; text-align: center;
        }

        .nav-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; min-height: 60px;
        }

        .arrow-btn {
            background: none; border: none;
            color: var(--text-dark);
            font-size: 35px;
            cursor: pointer; padding: 10px; width: 50px;
        }

        .timer-val { 
            font-weight: 600; color: #8e6d5d; font-size: 13px; 
            text-align: center; flex: 1;
        }

        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 34px; margin-bottom: 20px;
        }

        .alive-point {
            display: inline-block;
            color: var(--gold);
            animation: pulsePoint 1.5s infinite;
            font-weight: bold;
        }

        @keyframes pulsePoint {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-particles"></div>
    <div id="bg-flow"></div>

    <div id="scr1" class="screen">
        <div class="glass-card">
            <h1 style="font-family: 'Great Vibes'; font-size: 40px; color: var(--gold); margin-bottom: 20px;">For my baby</h1>
            <button class="btn-entry" onclick="go('scr1', 'scr2')">Открыть</button>
        </div>
    </div>

    <div id="scr2" class="screen hidden">
        <div class="glass-card">
            <h1 style="font-family: 'Great Vibes'; font-size: 35px; color: var(--gold); margin-bottom: 20px;">Secret</h1>
            <input type="password" id="pass" placeholder="ДДММГГ" inputmode="numeric">
            <button class="btn-entry" onclick="check()">Войти</button>
            <p id="err" style="color: var(--gold); margin-top: 15px; font-size: 14px;"></p>
        </div>
    </div>

    <div id="scr3" class="screen hidden">
        <div class="book-wrapper">
            <div class="page page-cover active" id="p0">
                <div class="gold-embossing" id="bookCover">
                    <p style="letter-spacing: 5px; opacity: 0.7; font-size: 12px;">MEMORIES</p>
                    <h1 style="font-size: 52px; font-family: 'Great Vibes';">Diary of Love</h1>
                    <p style="margin-top: 25px; font-size: 16px; opacity: 0.8;">Seven Months</p>
                    <button class="btn-entry" style="margin-top: 40px; max-width: 160px; align-self: center;" onclick="nextPage()">Читать</button>
                </div>
            </div>

            <div id="dynamicPages"></div>

            <div class="page" id="pFinal">
                <div class="text-box">
                    <div class="signature">С любовью,<br>твой маленький мальчик<span class="alive-point">!</span></div>
                </div>
                <div class="nav-controls" style="justify-content: center;">
                    <button class="arrow-btn" onclick="prevPage()">&#8249;</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const texts = [
            "Нам 7 месяцев. И если честно, я до сих пор не могу в это поверить. Вроде бы просто цифра, всего лишь половина года, но внутри это ощущается намного больше. Будто мы прожили друг с другом уже целую маленькую жизнь.",
            "Потому что это уже давно не про время. Это про нас. Про всё, через что мы прошли вместе. Про эмоции, про ссоры, про примирения, про моменты, когда казалось, что мы почти ломаемся, но всё равно остаёмся рядом.",
            "Мы не идеальные. И даже близко нет. У нас были тяжёлые ссоры, были моменты, когда слова слишком сильно ранили, когда тишина между нами длилась слишком долго. Когда казалось, что мы уже на грани.",
            "Но потом происходило одно и то же. Мы начинали скучать друг по другу. И это чувство всегда оказывалось сильнее гордости, сильнее обид, сильнее злости и любых эмоций. Мы всё равно возвращались друг к другу.",
            "И каждый раз это ощущалось будто заново, но уже намного глубже. И знаешь, как классно иногда оборачиваться назад и смотреть на нас сейчас. На то, какими мы были раньше, и какими стали рядом друг с другом.",
            "Потому что если честно, я всё больше убеждаюсь в том, что мы созданы друг для друга. Пусть не идеальные, пусть иногда слишком эмоциональные, но настоящие. Живые. Такие, какими и должны быть реальные чувства.",
            "Я помню наши обнимашки у кресента. И если честно, это вообще отдельная часть нашей истории, которую невозможно перепутать ни с чем другим. Это не было просто «мы встретились и обнялись».",
            "В тот момент будто весь мир на секунду перестал существовать. Ты пришла с переживаниями, с волнением, с внутренним страхом, но всё равно была рядом. И когда мы обнялись, всё вокруг будто исчезло. Не было людей, шума, проблем. Были только ты и я.",
            "И когда я поцеловал ручки моей малюськи, это было не просто так. Это был очень бережный, почти трепетный жест, потому что в тот момент ты ощущалась для меня самым ценным человеком.",
            "В этих поцелуях было всё. Нежность, забота, тепло и то чувство, когда человек настолько важен тебе, что даже обычное прикосновение становится особенным.",
            "Или те обнимашки в подъезде математики. Когда всё получилось буквально в последний момент. Я успел приехать, забежать в подъезд, а там... Да там была та самая любимая моя девочка.",
            "И в ту секунду, когда ты оказалась в моих руках, было ощущение, будто всё наконец встало на свои места. Это длилось совсем недолго, но тепла в том моменте было столько, что я помню его до сих пор.",
            "Да я и вправду не мог наесться целуя тебя, боже как же я хотел всю при всю тебя расцеловать.",
            "И ещё те обнимашки перед Ляман. Мы стояли и обнимались, а она так удивилась. Мы потом ещё обсуждали это) Но даже в том моменте было что-то очень настоящее. Немного неловкое, очень живое, очень наше.",
            "И да, мы с тобой те ещё ревнульки) Пускай не всегда это показываем напрямую, но я вообще не сомневаюсь в том, что мы друг друга буквально к каждому столбу ревнуем.",
            "И если честно, для меня это даже по-своему мило, потому что в этом тоже видно, насколько мы друг другу важны.",
            "Наши поцелуи… Щёчки, ручки, голова... Для меня каждый такой момент остаётся внутри как маленькое тепло. Когда я целую тебя, это никогда не ощущается просто жестом. Это как тихое «ты мне очень важна» без слов.",
            "Когда я целовал твои ручки после обнимашек, это было ощущение, будто я пытаюсь через прикосновения передать всё, что чувствую, но не всегда умею сказать словами.",
            "И даже поцелуи в голову, такие спокойные и мягкие, всегда дают мне чувство уюта, будто в этот момент всё правильно. И знаешь, всё это вообще не про идеальные отношения.",
            "Потому что идеальных отношений, как в фильмах, не существует. Но нам это и не нужно. У нас есть что-то настоящее. Живое. Иногда сложное, иногда слишком эмоциональное, но настоящее.",
            "И самое главное, что в этой реальности мы всё равно выбираем друг друга. Даже когда меньше общаемся. Даже когда ссоримся. Даже когда между нами появляются усталость или обиды.",
            "Мы всё равно не отпускаем друг друга. И с каждым таким моментом становимся только ближе. Ты для меня человек, с которым спокойно по-настоящему. Не просто хорошо или приятно, а именно спокойно.",
            "С тобой я могу быть собой, без попыток казаться лучше, чем я есть. Со всеми своими ошибками, эмоциями, ревностью, странностями, с тем, что иногда я сам в себе не понимаю. И ты всё это видела. И всё равно осталась рядом.",
            "И это, бин, наверное самое ценное. Я правда горжусь тобой. Каждым твоим поступком, каждым твоим действием, тем, как ты умеешь любить, заботиться и быть рядом.",
            "Меня искренне радует всё, что связано с тобой, даже самые маленькие вещи. И если честно, мне кажется, никто никогда не показывал мне столько любви, сколько показала ты. Ты невероятно верная, очень честная, настоящая.",
            "И я иногда даже ловлю себя на мысли, что могу гордиться тем, что я именно твой парень, потому что рядом со мной такая замечательная девушка. Правда. Ты тот человек, рядом с которым хочется становиться лучше.",
            "И если задуматься, обычная пара “на интрижку” вряд ли смогла бы пройти через всё то, через что прошли мы. Вряд ли смогла бы постоянно расти, меняться, учиться понимать друг друга и всё равно оставаться вместе.",
            "А мы смогли. И до сих пор продолжаем становиться лучше рядом друг с другом. И я правда счастлив просто общаться с тобой, быть рядом с тобой, чувствовать тебя в своей жизни.",
            "Поэтому пожалуйста, не смотри на те моменты, когда я могу злиться, расстраиваться или переживать из-за чего-то. Помни главное, я всегда люблю тебя и никогда не хочу делать тебе больно.",
            "Нет ничего в этом мире, что ты могла бы сделать, делаешь сейчас или сделаешь когда-нибудь, из-за чего я стал бы любить тебя меньше. Наоборот. С каждым днём я люблю тебя только сильнее.",
            "И знаешь, как говорила тётя Сабина, терпение реально очень важная штука. Особенно в отношениях. Да, ты иногда говоришь, что часто обижаешься, но солнышко моё, ты же знаешь, что я только умиляюсь с того.",
            "Может быть с другими людьми я слишком прямолинейный, но с тобой всё иначе. Да, между нами всего два года разницы, но в моих глазах ты всё равно моя малюська. Особенно когда дуешься.",
            "И иногда я даже представляю, как наша дочка в будущем тоже будет постоянно обижаться на нас так же мило, как ты сейчас) Я хочу быть для тебя опорой и поддержкой. И иншАллах, душа моя, у нас всё будет хорошо.",
            "Я правда очень ценю тебя. И иногда мне даже стыдно за свои поступки, когда я веду себя не так, как должен. Но ты всё равно не уходишь. Ты остаёшься рядом. Мы пытаемся говорить и исправлять ошибки.",
            "Нам 7 месяцев. Но ощущение такое, будто это только начало чего-то очень большого. И если это действительно только начало нашей истории, то я не хочу терять то, что у нас есть. Я верю в нас 🤍"
        ];

        let currentPage = 0;
        const totalPages = texts.length + 2;
        const words = ["E🤍", "forever"];
        const flowContainer = document.getElementById('bg-flow');

        function createFlowItem() {
            const item = document.createElement('div');
            item.className = 'flow-item';
            item.innerText = words[Math.floor(Math.random() * words.length)];
            const startX = Math.random() * (window.innerWidth - 80);
            const size = 22 + Math.random() * 14;
            item.style.left = startX + 'px';
            item.style.fontSize = size + 'px';
            item.style.top = '-50px';
            flowContainer.appendChild(item);
            const animation = item.animate([
                { transform: 'translateY(0)' },
                { transform: `translateY(${window.innerHeight + 100}px)` }
            ], {
                duration: 11000,
                easing: 'linear'
            });
            animation.onfinish = () => { item.remove(); };
        }

        setInterval(createFlowItem, 1300);

        function go(f, t) {
            document.getElementById(f).classList.add('hidden');
            document.getElementById(t).classList.remove('hidden');
        }

        function check() {
            if(document.getElementById('pass').value === '201025') {
                if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                buildPages();
                go('scr2', 'scr3');
                updateTimer();
                setInterval(updateTimer, 1000);
            } else {
                document.getElementById('err').innerText = "Неверная дата, балам";
            }
        }

        function buildPages() {
            const container = document.getElementById('dynamicPages');
            container.innerHTML = '';
            texts.forEach((text, i) => {
                const div = document.createElement('div');
                div.className = 'page';
                div.id = `p${i+1}`;
                div.innerHTML = `
                    <div class="text-box">${text}</div>
                    <div class="nav-controls">
                        <button class="arrow-btn" onclick="prevPage()">&#8249;</button>
                        <span class="timer-val global-timer">...</span>
                        <button class="arrow-btn" onclick="nextPage()">&#8250;</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function nextPage() {
            if(currentPage < totalPages - 1) { currentPage++; updatePage(); }
        }

        function prevPage() {
            if(currentPage > 0) { currentPage--; updatePage(); }
        }

        function updatePage() {
            if (navigator.vibrate) navigator.vibrate(20);
            document.querySelectorAll('.page').forEach((p, i) => {
                p.classList.toggle('active', i === currentPage);
            });
        }

        function updateTimer() {
            const startDate = new Date('2025-10-20T22:47:00');
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            const timerStr = `${days}д ${hours}ч ${mins}м ${secs}с`;
            document.querySelectorAll('.global-timer').forEach(el => el.innerText = timerStr);
        }

        window.addEventListener('deviceorientation', (e) => {
            const cover = document.getElementById('bookCover');
            if(!cover) return;
            const x = Math.min(Math.max(e.beta, -15), 15) / 2;
            const y = Math.min(Math.max(e.gamma, -15), 15) / 2;
            cover.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
        });
    </script>
</body>
</html>
