<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Diary of Love</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0d0a09;
    --glass:rgba(255,255,255,.06);
    --gold:#d6a48f;
    --text:#3a2f2c;
    --page:#fdf9f5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    height:100dvh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Cormorant Garamond',serif;
    background:radial-gradient(circle at top,#241917,#0b0807 70%);
}

/* background */
.bg{
    position:fixed;
    inset:0;
    z-index:-1;
}

.glow{
    position:absolute;
    width:420px;
    height:420px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.16;
    animation:float 12s ease-in-out infinite;
}

.glow:nth-child(1){background:#d6a48f;top:-140px;left:-120px;}
.glow:nth-child(2){background:#7a5246;bottom:-140px;right:-120px;animation-delay:4s;}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(50px);}
}

/* screens */
.screen{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:.6s;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

/* card */
.card{
    width:100%;
    max-width:360px;
    padding:38px 26px;
    border-radius:28px;
    background:var(--glass);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
}

.title{
    font-family:'Great Vibes',cursive;
    font-size:54px;
    color:var(--gold);
}

.subtitle{
    margin:10px 0 24px;
    font-size:12px;
    letter-spacing:3px;
    opacity:.7;
    color:#d8c6bf;
}

input{
    width:100%;
    padding:18px;
    border-radius:14px;
    border:none;
    text-align:center;
    font-size:20px;
    margin-bottom:16px;
    outline:none;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
    letter-spacing:3px;
    color:white;
    background:linear-gradient(135deg,#d6a48f,#b17f69);
}

/* book */
.book{
    width:100%;
    max-width:400px;
    height:86dvh;
    position:relative;
    perspective:1200px;
}

.page{
    position:absolute;
    inset:0;
    background:var(--page);
    border-radius:26px;
    padding:34px 24px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;

    opacity:0;
    transform:translateX(40px) rotateY(8deg);
    transition:0.55s cubic-bezier(.2,.8,.2,1);
    pointer-events:none;

    box-shadow:0 40px 90px rgba(0,0,0,.55);
}

.page.active{
    opacity:1;
    transform:translateX(0) rotateY(0);
    pointer-events:auto;
}

/* text */
.text{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:20px;
    line-height:1.75;
    font-style:italic;
    color:var(--text);
}

/* nav */
.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
}

.arrow{
    width:52px;
    height:52px;
    border-radius:50%;
    border:none;
    font-size:26px;
    background:#f1e6e1;
    color:#6c5147;
}

.counter{
    font-size:13px;
    color:#8a6a5c;
}

/* cover */
.cover{
    background:linear-gradient(180deg,#1b1311,#0f0c0b);
    color:var(--gold);
    justify-content:center;
    align-items:center;
    text-align:center;
}

.cover h1{
    font-family:'Great Vibes',cursive;
    font-size:62px;
}

.cover p{
    margin-top:12px;
    opacity:.8;
}

/* progress */
.progress{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    height:4px;
    background:rgba(0,0,0,.08);
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#d6a48f,#b17f69);
    transition:.4s;
}

.final{
    font-family:'Great Vibes',cursive;
    font-size:44px;
    color:#7a5d52;
    text-align:center;
}
</style>
</head>

<body>

<div class="bg">
    <div class="glow"></div>
    <div class="glow"></div>
</div>

<div class="screen" id="s1">
    <div class="card">
        <div class="title">For you</div>
        <div class="subtitle">OUR STORY</div>
        <button onclick="openLogin()">Открыть</button>
    </div>
</div>

<div class="screen hidden" id="s2">
    <div class="card">
        <div class="title">Secret</div>
        <div class="subtitle">Введите дату</div>
        <input id="pass" type="password" placeholder="ДДММГГ">
        <button onclick="login()">Войти</button>
        <p id="err" style="color:#d6a48f;margin-top:12px;"></p>
    </div>
</div>

<div class="screen hidden" id="s3">

<div class="book">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="page cover active">
<div>
<h1>Diary of Love</h1>
<p>Seven Months</p>
<button style="margin-top:30px;" onclick="start()">Читать</button>
</div>
</div>

<div id="pages"></div>

<div class="page">
<div class="text">
<div class="final">С любовью,<br>твой мальчик 🤍</div>
</div>
<div class="nav">
<button class="arrow" onclick="prev()">‹</button>
</div>
</div>

</div>

</div>

<script>

const texts = [
"Нам 7 месяцев, не могу в это поверить. Это уже давно не просто цифра, это мы, всё что между нами было.",
"Мы не идеальные, но всегда возвращались друг к другу.",
"Я помню наши обнимашки у кресента, будто мир остановился.",
"И когда я целовал ручки моей малюськи, в этом было всё.",
"Обнимашки в подъезде математики были слишком настоящими.",
"И обнимашки перед Ляман тоже.",
"Поцелуи в щёчки, ручки, голову — мой язык любви.",
"С тобой мне спокойно по-настоящему.",
"Я горжусь тобой и тем, какая ты есть.",
"И горжусь тем, что я твой парень.",
"Ты дала мне больше любви, чем я когда-либо знал.",
"Даже если мы ссоримся — мы не отпускаем.",
"Я верю в нас.",
"Дом, жизнь, будущее — уже не мечта.",
"Я не идеален, но стараюсь ради нас.",
"Я люблю тебя 🤍"
];

let i = 0;
let auto = null;

function render(){
const root = document.getElementById('pages');
root.innerHTML = '';

texts.forEach((t,idx)=>{
const p = document.createElement('div');
p.className = 'page';
p.innerHTML = `
<div class="text">${t}</div>
<div class="nav">
<button class="arrow" onclick="prev()">‹</button>
<div class="counter">${idx+1}/${texts.length}</div>
<button class="arrow" onclick="next()">›</button>
</div>
`;
root.appendChild(p);
});

update();
}

function update(){
const pages = document.querySelectorAll('.page');
pages.forEach((p,idx)=>{
p.classList.toggle('active', idx === i);
});

const bar = document.getElementById('bar');
bar.style.width = ((i)/(texts.length-1))*100 + '%';

if(navigator.vibrate) navigator.vibrate(12);

localStorage.setItem('page', i);
}

function next(){
if(i < texts.length) i++;
update();
}

function prev(){
if(i > 0) i--;
update();
}

function openLogin(){
document.getElementById('s1').classList.add('hidden');
document.getElementById('s2').classList.remove('hidden');
}

function login(){
if(document.getElementById('pass').value === '201025'){
document.getElementById('s2').classList.add('hidden');
document.getElementById('s3').classList.remove('hidden');

i = parseInt(localStorage.getItem('page') || 0);
render();
}else{
document.getElementById('err').innerText = 'Неверная дата';
}
}

function start(){
i = 0;
update();
}

document.addEventListener('keydown',(e)=>{
if(e.key==='ArrowRight') next();
if(e.key==='ArrowLeft') prev();
});

</script>

</body>
</html>
