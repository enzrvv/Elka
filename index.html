<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Seven Months</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cover-bg: #32161a;
            --gold: #e5b89d;
            --page-bg: #fffcf9;
            --text-dark: #3d302d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            height: 100dvh;
            background: #1c1412;
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        .bg-particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(28, 20, 18, 0.2) 0%, #110c0b 100%);
            z-index: -2;
        }

        #bg-flow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .flow-item {
            position: absolute;
            color: rgba(212, 163, 145, 0.45); 
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            white-space: nowrap;
            user-select: none;
            will-change: transform;
            font-weight: 600;
        }

        .screen {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
            transition: opacity 0.6s ease;
        }

        .hidden { opacity: 0; pointer-events: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 40px 30px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }

        input {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 22px;
            background: #fff;
            color: #000;
            outline: none;
        }

        .btn-entry {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: var(--gold);
            color: #32161a;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .book-wrapper {
            width: 100%;
            max-width: 380px;
            height: 85dvh;
            position: relative;
            transform-style: preserve-3d;
        }

        .page {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 20px;
            padding: 25px 20px 20px 20px;
            display: none;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: var(--page-bg);
            color: var(--text-dark);
            backface-visibility: hidden;
            transform-origin: left center;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease;
            z-index: 1;
        }

        .page.active { 
            display: flex; 
            transform: rotateY(0deg);
            opacity: 1;
            z-index: 3;
        }

        .page.flipped {
            display: flex;
            transform: rotateY(-140deg);
            opacity: 0;
            z-index: 2;
        }

        .page-header-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            min-height: 24px;
            margin-bottom: 5px;
        }

        .page-header {
            text-align: center;
            font-size: 14px;
            letter-spacing: 1px;
            color: #8e6d5d;
            font-style: italic;
            padding: 0 35px;
        }

        .page-divider {
            width: 60%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 0 auto 15px auto;
            opacity: 0.6;
        }

        .page-cover {
            background: var(--cover-bg);
            background-image: url('https://www.transparenttextures.com/patterns/soft-wallpaper.png');
            color: var(--gold);
            justify-content: center; align-items: center; text-align: center;
            border: 1px solid rgba(229, 184, 157, 0.2);
            transform-origin: left center;
        }
        
        .gold-embossing {
            border: 1px solid var(--gold);
            outline: 3px double var(--gold);
            outline-offset: -8px;
            padding: 40px 15px;
            width: 90%; height: 90%;
            display: flex; flex-direction: column; justify-content: center;
            border-radius: 12px;
            position: relative;
            transition: transform 0.1s ease-out;
        }

        .cover-heart {
            font-size: 18px;
            color: var(--gold);
            margin: 20px 0;
            opacity: 0.9;
        }

        .text-box {
            font-size: 18px;
            line-height: 1.55;
            font-style: italic;
            flex-grow: 1;
            display: flex; flex-direction: column; justify-content: center; text-align: center;
            padding: 0 10px;
            overflow-y: auto;
        }

        .nav-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 5px; min-height: 45px;
        }

        .arrow-btn {
            background: none; border: none;
            color: var(--text-dark);
            font-size: 35px;
            cursor: pointer; padding: 5px 10px; width: 50px;
        }

        .timer-val { 
            font-weight: 600; color: #8e6d5d; font-size: 13px; 
            text-align: center; flex: 1;
        }

        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 34px; margin-bottom: 20px;
        }

        .alive-point {
            font-family: sans-serif;
            font-weight: 900;
            font-size: 42px;
            color: var(--text-dark);
            display: inline-block;
            margin-left: 2px;
            vertical-align: baseline;
        }

        .menu-trigger {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 22px;
            height: 16px;
            z-index: 10;
        }

        .menu-trigger span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: var(--gold);
            border-radius: 2px;
        }

        .menu-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(28, 20, 18, 0.97); 
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .menu-overlay.open {
            opacity: 1; pointer-events: auto;
        }

        .menu-close {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 25px;
            color: var(--gold);
            font-size: 35px;
            cursor: pointer;
            padding: 10px;
        }

        .menu-list {
            list-style: none;
            text-align: center;
            width: 85%;
            max-width: 320px;
        }

        .menu-item {
            color: #fff;
            font-size: 18px;
            font-style: italic;
            margin: 16px 0;
            cursor: pointer;
            transition: color 0.3s ease;
            opacity: 0;
            transform: translateY(15px);
        }

        .menu-overlay.open .menu-item {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .menu-overlay.open .menu-item:nth-child(1) { transition-delay: 0.05s; }
        .menu-overlay.open .menu-item:nth-child(2) { transition-delay: 0.1s; }
        .menu-overlay.open .menu-item:nth-child(3) { transition-delay: 0.15s; }
        .menu-overlay.open .menu-item:nth-child(4) { transition-delay: 0.2s; }
        .menu-overlay.open .menu-item:nth-child(5) { transition-delay: 0.25s; }
        .menu-overlay.open .menu-item:nth-child(6) { transition-delay: 0.3s; }
        .menu-overlay.open .menu-item:nth-child(7) { transition-delay: 0.35s; }
        .menu-overlay.open .menu-item:nth-child(8) { transition-delay: 0.4s; }

        .menu-item:hover, .menu-item.active-chapter {
            color: var(--gold);
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop src="Shape.mp3"></audio>

    <div class="bg-particles"></div>
    <div id="bg-flow"></div>

    <div id="menuBox" class="menu-overlay">
        <div class="menu-close" onclick="toggleMenu()">&times;</div>
        <ul class="menu-list">
            <li class="menu-item" onclick="jumpToChapter(0)">Обложка</li>
            <li class="menu-item" onclick="jumpToChapter(1)">Глава 1 🤍</li>
            <li class="menu-item" onclick="jumpToChapter(5)">Глава 2 🫂</li>
            <li class="menu-item" onclick="jumpToChapter(11)">Глава 3 🖤</li>
            <li class="menu-item" onclick="jumpToChapter(14)">Глава 4 ✨</li>
            <li class="menu-item" onclick="jumpToChapter(18)">Глава 5 🐰</li>
            <li class="menu-item" onclick="jumpToChapter(21)">Глава 6 💍</li>
            <li class="menu-item" onclick="jumpToChapter(26)">Глава 7 🧸</li>
        </ul>
    </div>

    <div id="scr1" class="screen">
        <div class="glass-card">
            <h1 style="font-family: 'Great Vibes'; font-size: 40px; color: var(--gold); margin-bottom: 20px;">For my baby</h1>
            <button class="btn-entry" onclick="startAll()">Открыть</button>
        </div>
    </div>

    <div id="scr2" class="screen hidden">
        <div class="glass-card">
            <h1 style="font-family: 'Great Vibes'; font-size: 35px; color: var(--gold); margin-bottom: 20px;">Secret</h1>
            <input type="password" id="pass" placeholder="ДДММГГ" inputmode="numeric">
            <button class="btn-entry" onclick="check()">Войти</button>
            <p id="err" style="color: var(--gold); margin-top: 15px; font-size: 14px;"></p>
        </div>
    </div>

    <div id="scr3" class="screen hidden">
        <div class="book-wrapper">
            <div class="page page-cover active" id="p0">
                <div class="gold-embossing" id="bookCover">
                    <p style="letter-spacing: 5px; opacity: 0.6; font-size: 11px;">MEMORIES</p>
                    <h1 style="font-size: 52px; font-family: 'Great Vibes'; font-weight: 400; margin-top: 10px;">Diary of Love</h1>
                    <div class="cover-heart">✦ 🤍 ✦</div>
                    <p style="font-size: 16px; opacity: 0.8; font-style: italic; letter-spacing: 1px;">Seven Months</p>
                    <button class="btn-entry" style="margin-top: 40px; max-width: 160px; align-self: center;" onclick="nextPage()">Читать</button>
                </div>
            </div>

            <div id="dynamicPages"></div>

            <div class="page" id="pFinal">
                <div class="page-header-container">
                    <div class="menu-trigger" onclick="toggleMenu()">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="page-divider"></div>
                <div class="text-box">
                    <div class="signature">С любовью,<br>твой маленький мальчик<span class="alive-point">!</span></div>
                </div>
                <div class="nav-controls" style="justify-content: center;">
                    <button class="arrow-btn" onclick="prevPage()">&#8249;</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        
        function startAll() {
            go('scr1', 'scr2');
        }

        const chapters = [
            { start: 1, end: 4, title: "Глава 1 🤍" },
            { start: 5, end: 10, title: "Глава 2 🫂" },
            { start: 11, end: 13, title: "Глава 3 🖤" },
            { start: 14, end: 17, title: "Глава 4 ✨" },
            { start: 18, end: 20, title: "Глава 5 🐰" },
            { start: 21, end: 25, title: "Глава 6 💍" },
            { start: 26, end: 31, title: "Глава 7 🧸" }
        ];

        const texts = [
            "Нам 7 месяцев. И если честно, я до сих пор не могу в это поверить. Вроде бы просто цифра, всего лишь половина года, но внутри это ощущается намного больше. Будто мы прожили друг с другом уже целую маленькую жизнь.",
            "Потому что это уже давно не про время. Это про нас. Про всё, через что мы прошли вместе. Про эмоции, про ссоры, про примирения, про моменты, когда казалось, что мы почти ломаемся, но всё равно остаёмся рядом.",
            "Мы не идеальные. И даже близко нет. У нас были тяжёлые ссоры, были моменты, когда слова слишком сильно ранили, когда тишина между нами длилась слишком долго. Когда казалось, что мы уже на грани.",
            "Но потом происходило одно и то же. Мы начинали скучать друг по другу. И это чувство всегда оказывалось сильнее гордости, сильнее обид, сильнее злости и любых эмоций. Мы всё равно возвращались друг к другу.",
            "И каждый раз это ощущается будто заново, но уже намного глубже. И знаешь, как классно иногда оборачиваться назад и смотреть на нас сейчас. На то, какими мы были раньше, и какими стали рядом друг с другом.",
            "Потому что если честно, я всё больше убеждаюсь в том, что мы созданы друг для друга. Пусть не идеальные, пусть иногда слишком эмоциональные, но настоящие. Живые. Такие, какими и должны быть реальные чувства.",
            "Знаешь, смотря на нас сейчас, я смело могу заявить, что мне никто кроме тебя не нужен. Что я сумел найти ту самую, ту, которая будет рядом, когда я буду в этом нуждаться. Ту, с кем я смогу радоваться и грустить.",
            "Ту, чьи капризы мне будет приятно терпеть. Ту, которая была рядом, когда не обязана. Ту, кто не оставила меня. Ту, с кем я связан настолько, что никто этого не опровергнет.",
            "Я помню наши обнимашки у кресента. И если честно, это вообще отдельная часть нашей истории, которую невозможно перепутать ни с чем другим. Это не было просто «мы встретились и обнялись». В тот момент будто весь мир на секунду перестал существовать.",
            "Ты пришла с переживаниями, с волнением, с внутренним страхом, но всё равно была рядом. И когда мы обнялись, всё вокруг будто исчезло. Не было людей, шума, проблем. Были только ты и я.",
            "И когда я поцеловал ручки моей малюськи, это было не просто так. Это был очень бережный, почти трепетный жест, потому что в тот момент ты ощущалась для меня самым ценным человеком. В этих поцелуях было всё. Нежность, забота, тепло.",
            "Или те обнимашки в подъезде математики. Когда всё получилось буквально в последний момент. Я успел приехать, и в ту секунду, когда ты оказалась в моих руках, было ощущение, будто всё наконец встало на свои места. Это длилось совсем недолго, но тепла в том моменте было столько, что я помню его до сих пор.",
            "И ещё те обнимашки перед Ляман. Мы стояли и обнимались, а она так удивилась. Мы потом ещё обсуждали это) Но даже в том моменте было что-то очень настоящее. Немного неловкое, очень живое, очень наше.",
            "И да, мы с тобой те ещё ревнульки) Пускай не всегда это показываем напрямую, но я вообще не сомневаюсь в том, что мы друг друга буквально к каждому столбу ревнуем. И если честно, для меня это даже по-своему мило, потому что в этом тоже видно, насколько мы друг другу важны.",
            "В понедельник я проснулся в холодном поту, заплаканный и злой. Сначала не понял, в чём дело, думал, просто ужастик. Резко попытался вспомнить. Знаешь, что я там видел? Что так меня испугало и разозлило. Причём знаешь это чувство, будто тяжело в груди. Я видел тебя. Тебя, но не со мной. Ты с кем-то говорила.",
            "И если честно, от одной только мысли о том, что кто-то другой мог бы быть рядом с тобой, меня в дрожь бросает. Я не хочу, чтобы кто-либо на этой планете мог быть с тобой кроме меня. Да, звучит не очень правильно, но я сказал то, что думаю. Я не потерплю кого-то рядом с тем человеком, с которым мне настолько хорошо.",
            "И наши поцелуи. Щёчки, ручки, голова… Для меня каждый такой момент остаётся внутри как маленькое тепло. Когда я целую тебя, это никогда не ощущается просто жестом. Это как тихое «ты мне очень важна» без слов.",
            "Когда я целовал твои ручки после обнимашек, это было ощущение, будто я пытаюсь через прикосновения передать всё, что чувствую, но не всегда умею сказать словами. И даже поцелуи в голову, такие спокойные и мягкие, всегда дают мне чувство уюта, будто в этот момент всё правильно.",
            "И знаешь, я до сих пор помню тот момент, когда ты так старалась помочь мне с фотографией на документы. Вроде бы такая простая вещь со стороны, обычная фотография, но то, как ты тогда переживала за результат, как старалась сделать всё идеально и угодить мне, очень сильно меня тронуло.",
            "Мы вроде уже сделали нормальную фотографию, и я сначала даже не понял, зачем ты попросила подождать. А потом у меня внутри появилось очень тёплое чувство, потому что я понял, насколько тебе важно сделать что-то для меня по-настоящему хорошо. И честно, это было бесценно для меня.",
            "Честно, есть столько всего, что я просто не смогу высказать, потому что не знаю такого правильного описания этому всему. И знаешь, всё это вообще не про идеальные отношения. Потому что идеальных отношений, как в иллюзиях, не существует. Но нам это и не нужно. У нас есть что-то настоящее.",
            "Живое. Иногда сложное, иногда слишком эмоциональное, но настоящее. И самое главное, что в этой реальности мы всё равно выбираем друг друга. Даже когда меньше общаемся. Даже когда ссоримся. Даже когда между нами появляются усталость или обиды. Мы всё равно не отпускаем друг друга.",
            "И знаешь, любовь вообще не про идеальность. Не про вечную лёгкость и не про отсутствие ссор. Я как-то увидел мысль, которая очень сильно засела у меня внутри. Что любовь, это не просто чувство. Чувства приходят и уходят. А любовь, это решение. Решение каждый раз оставаться рядом.",
            "И если честно, мне кажется, именно это и происходит между нами. Потому что кто угодно может любить, когда всё идеально. Но остаться рядом, пытаться понять, терпеть, разговаривать, меняться и всё равно выбирать одного и того же человека снова и снова, вот это уже настоящее.",
            "Ты для меня человек, с которым спокойно по-настоящему. Не просто хорошо или приятно, а именно спокойно. С тобой я могу быть собой, без попыток казаться лучше, чем я есть. Со всеми своими ошибками, эмоциями, ревностью, странностями... И ты всё это видела. И всё равно осталась рядом.",
            "Я правда горжусь тобой. Каждым твоим поступком, каждым твоим действием, тем, как ты умеешь любить, заботиться и быть рядом. Меня искренне радует всё, что связано с тобой, даже самые маленькие вещи.",
            "Честно, я чуть-чуть покопался у тебя в избранных. Да, чуть поплакал. Отчасти за себя. За то, что у меня такая прекрасная девушка. И надеюсь, ты и вправду думаешь так, как в некоторых из того списка. И отчасти за тебя. За то, что ты не живёшь так, как заслуживаешь. А я тебе клянусь, ты всегда достойна лучшего.",
            "И мне душу постоянно рвёт после того, как я близко узнаю, что тебе плохо. И если честно, мне кажется, никто никогда не показывал мне столько любви, сколько показала ты. Ты невероятно верная, очень честная, настоящая. И я иногда даже ловлю себя на мысли, что могу гордиться тем, что я именно твой парень.",
            "Давай говорить серьёзно. Кто бы там что ни говорил, я верю в то, что у нас всё с тобой получится. Почему? Да ответ прост. Ты не ошиблась, когда сказала, что мы уже ментально женаты. А как иначе назвать людей, которые 24/7 вместе, ссорятся, мирятся, проводят большую часть времени вместе, ценят друг друга и всегда надеются на лучшее?",
            "И я правда счастлив просто общаться с тобой, быть рядом с тобой, чувствовать тебя в своей жизни. Помни главное, я всегда люблю тебя и никогда не хочу делать тебе больно. Нет ничего в этом мире, из-за чего я стал бы любить тебя меньше. Наоборот, с каждым днём я люблю тебя только сильнее.",
            "И знаешь, как говорила тётя Сабина, терпение реально очень важная штука. Особено в отношениях. Да, ты иногда говоришь, что часто обижаешься, но солнышко моё, ты же знаешь, что я только умиляюсь с того, как ты это делаешь. Да, между нами всего два года разницы, но в моих глазах ты всё равно моя малюська. И иногда я даже представляю, как наша дочка в будущем тоже будет постоянно обижаться на нас так же мило, как ты сейчас)",
            "Знаешь, если быть с тобой совсем честным, я даже злюсь на себя, что когда-то мог случайно сказать что-то обидное или не сделать чего-то, чего ты так от меня ждала. Понимаю, тяжело, но я хочу, чтобы ты могла чувствовать себя в безопасности рядом со мной. Забудь про всё, я решу. Я хочу быть для тебя твоей опорой, поддержкой, тем, к кому ты всегда можешь прийти. И иншАллах, душа моя, у нас всё будет хорошо.",
            "Если вспомнить конец декабря и январь, это был очень важный период для нас. Тогда мы реально могли потеряться. Было много непонимания, напряжения, ощущение, будто всё рушится. Но мы всё равно не отпустили друг друга. Мы остались. И прошли через это вместе.",
            "Сейчас мы уже другие. Не идеальные, но более настоящие. Мы умеем разговаривать друг с другом. Пусть не всегда сразу, пусть иногда тяжело, но мы стараемся понять друг друга. И даже то, что мы иногда меньше общаемся сейчас, вообще не уменьшает то, что между нами есть. Суть не в количестве сообщений. Суть в том, насколько мы значим друг для друга.",
            "Понимаешь ли, я ни в одном из своих состояний я не забуду тебя, не оставлю мысли о том, что люблю, и не оставлю тебя. Всегда постараюсь быть лучшим и дать лучшее. От тебя я лишь прошу одного и только одного. Будь со мной. Будь рядом. Будь той, ради кого я живу. Просто будь со мной.",
            "Иногда я думаю о будущем. Уже не как о какой-то далёкой фантазии, а как о чём-то, что мы реально обсуждаем. Дом, жизнь, свадьба, обычные дни вместе, когда не нужно ничего доказывать, потому что есть просто «мы». Да, пускай мы ещё официально не женаты, но я правда полностью уверен в нас обоих. Потому что столько всего мы уже, Şükür Allaha, прошли вместе.",
            "И наверное ещё многое ждёт впереди. Но я очень надеюсь, что İnşAllah мы с тобой всё это тоже пройдём вместе. Я не идеален, могу ошибаться, могу перегибать. Но ты всё равно рядом, и я никогда не воспринимаю это как должное. Я правда стараюсь быть достойным твоего выбора. Нам 7 месяцев. Но ощущение такое, будто это только начало чего-то очень большого. Я верю в нас."
        ];

        let currentPage = 0;
        let totalPages = 2; 
        const words = ["E🤍", "forever"];
        const flowContainer = document.getElementById('bg-flow');

        function createFlowItem() {
            const item = document.createElement('div');
            item.className = 'flow-item';
            item.innerText = words[Math.floor(Math.random() * words.length)];
            const startX = Math.random() * (window.innerWidth - 80);
            const size = 22 + Math.random() * 14;
            item.style.left = startX + 'px';
            item.style.fontSize = size + 'px';
            item.style.top = '-50px';
            flowContainer.appendChild(item);
            const animation = item.animate([
                { transform: 'translateY(0)' },
                { transform: `translateY(${window.innerHeight + 100}px)` }
            ], {
                duration: 11000,
                easing: 'linear'
            });
            animation.onfinish = () => { item.remove(); };
        }

        setInterval(createFlowItem, 1300);

        function go(f, t) {
            document.getElementById(f).classList.add('hidden');
            document.getElementById(t).classList.remove('hidden');
        }

        function check() {
            if(document.getElementById('pass').value === '201025') {
                if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                audio.play().catch(() => {});
                buildPages();
                go('scr2', 'scr3');
                updateTimer();
                setInterval(updateTimer, 1000);
            } else {
                document.getElementById('err').innerText = "Неверная дата, балам";
            }
        }

        function getChapterTitle(pageIndex) {
            const ch = chapters.find(c => pageIndex >= c.start && pageIndex <= c.end);
            return ch ? ch.title : "";
        }

        function buildPages() {
            const container = document.getElementById('dynamicPages');
            container.innerHTML = '';
            texts.forEach((text, i) => {
                const pageNum = i + 1;
                const chTitle = getChapterTitle(pageNum);
                const div = document.createElement('div');
                div.className = 'page';
                div.id = `p${pageNum}`;
                div.innerHTML = `
                    <div class="page-header-container">
                        <div class="page-header">${chTitle}</div>
                        <div class="menu-trigger" onclick="toggleMenu()">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                    <div class="page-divider"></div>
                    <div class="text-box">${text}</div>
                    <div class="nav-controls">
                        <button class="arrow-btn" onclick="prevPage()">&#8249;</button>
                        <span class="timer-val global-timer">...</span>
                        <button class="arrow-btn" onclick="nextPage()">&#8250;</button>
                    </div>
                `;
                container.appendChild(div);
            });
            
            totalPages = texts.length + 2; 
            document.getElementById('pFinal').style.display = 'none';
        }

        function nextPage() {
            if(currentPage < totalPages - 1) { 
                currentPage++; 
                updatePage(); 
            }
        }

        function prevPage() {
            if(currentPage > 0) { 
                currentPage--; 
                updatePage(); 
            }
        }

        function updatePage() {
            if (navigator.vibrate) navigator.vibrate(20);
            
            const allPages = [];
            allPages.push(document.getElementById('p0'));
            for(let i = 1; i <= texts.length; i++) {
                allPages.push(document.getElementById(`p${i}`));
            }
            allPages.push(document.getElementById('pFinal'));

            allPages.forEach((p, i) => {
                if(!p) return;
                p.style.transition = "transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease";
                
                if (i === currentPage) {
                    p.style.display = 'flex';
                    void p.offsetHeight; 
                    p.classList.add('active');
                    p.classList.remove('flipped');
                } else if (i < currentPage) {
                    p.classList.remove('active');
                    p.classList.add('flipped');
                    setTimeout(() => { if(i < currentPage) p.style.display = 'none'; }, 800);
                } else {
                    p.classList.remove('active');
                    p.classList.remove('flipped');
                    p.style.display = 'none';
                }
            });
            updateActiveChapterHighlight();
        }

        function toggleMenu() {
            document.getElementById('menuBox').classList.toggle('open');
        }

        function jumpToChapter(index) {
            currentPage = index;
            toggleMenu();
            
            const allPages = [];
            allPages.push(document.getElementById('p0'));
            for(let i = 1; i <= texts.length; i++) {
                allPages.push(document.getElementById(`p${i}`));
            }
            allPages.push(document.getElementById('pFinal'));

            allPages.forEach((p, i) => {
                if(!p) return;
                p.style.transition = "none"; 
                
                if (i === currentPage) {
                    p.style.display = 'flex';
                    p.classList.add('active');
                    p.classList.remove('flipped');
                } else if (i < currentPage) {
                    p.classList.remove('active');
                    p.classList.add('flipped');
                    p.style.display = 'none';
                } else {
                    p.classList.remove('active');
                    p.classList.remove('flipped');
                    p.style.display = 'none';
                }
            });
            updateActiveChapterHighlight();
        }

        function updateActiveChapterHighlight() {
            const items = document.querySelectorAll('.menu-item');
            items.forEach(item => item.classList.remove('active-chapter'));
            let currentChapterItem = 0;
            if (currentPage >= 1 && currentPage <= 4) currentChapterItem = 1;
            else if (currentPage >= 5 && currentPage <= 10) currentChapterItem = 2;
            else if (currentPage >= 11 && currentPage <= 13) currentChapterItem = 3;
            else if (currentPage >= 14 && currentPage <= 17) currentChapterItem = 4;
            else if (currentPage >= 18 && currentPage <= 20) currentChapterItem = 5;
            else if (currentPage >= 21 && currentPage <= 25) currentChapterItem = 6;
            else if (currentPage >= 26 && currentPage <= 31) currentChapterItem = 7;
            if(currentPage === 0) currentChapterItem = 0;
            if(items[currentChapterItem]) items[currentChapterItem].classList.add('active-chapter');
        }

        function updateTimer() {
            const startDate = new Date('2025-10-20T22:47:00');
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            const timerStr = `${days}д ${hours}ч ${mins}м ${secs}с`;
            document.querySelectorAll('.global-timer').forEach(el => el.innerText = timerStr);
        }

        window.addEventListener('deviceorientation', (e) => {
            const cover = document.getElementById('bookCover');
            if(!cover) return;
            const x = Math.min(Math.max(e.beta, -15), 15) / 2;
            const y = Math.min(Math.max(e.gamma, -15), 15) / 2;
            cover.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
        });
    </script>
</body>
</html>
