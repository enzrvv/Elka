<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Our Story</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --gold:#d6a48f;
    --text:#3b2f2c;
    --card:#fdf9f5;
    --cover:#1c1412;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    height:100dvh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#241917,#0b0807 70%);
    font-family:'Cormorant Garamond',serif;
    perspective:1400px;
}

.bg{
    position:fixed;
    inset:0;
    z-index:-2;
}

.blur{
    position:absolute;
    width:360px;
    height:360px;
    filter:blur(100px);
    opacity:.18;
    border-radius:50%;
    animation:float 14s ease-in-out infinite;
}

.blur:nth-child(1){background:#d6a48f;top:-120px;left:-80px;}
.blur:nth-child(2){background:#8d5f4f;right:-100px;bottom:-120px;animation-delay:4s;}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(40px);}
}

.screen{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    transition:.5s;
}

.hidden{opacity:0;pointer-events:none;}

.login{
    width:100%;
    max-width:340px;
    padding:35px 25px;
    border-radius:35px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    text-align:center;
}

.title{
    font-family:'Great Vibes',cursive;
    font-size:52px;
    color:var(--gold);
}

.subtitle{
    margin-top:10px;
    margin-bottom:25px;
    font-size:12px;
    letter-spacing:3px;
    color:#d8c6bf;
    opacity:.8;
}

input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    font-size:20px;
    text-align:center;
    margin-bottom:18px;
}

button{
    width:100%;
    padding:17px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    background:linear-gradient(135deg,#d6a48f,#b17f69);
    color:white;
    font-weight:600;
    letter-spacing:3px;
}

.book{
    width:100%;
    max-width:390px;
    height:86dvh;
    position:relative;
}

.page{
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
    justify-content:space-between;
    padding:38px 26px;
    border-radius:28px;
    background:var(--card);
    color:var(--text);
    box-shadow:0 35px 70px rgba(0,0,0,.55);
}

.page.active{display:flex;}

.page-text{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:21px;
    line-height:1.65;
    font-style:italic;
}

.bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.arrow{
    width:52px;
    height:52px;
    border-radius:50%;
    border:none;
    background:#f2e7e1;
    font-size:28px;
    color:#6d5348;
}

.counter{
    font-size:14px;
    color:#8b6b5d;
}

.cover{
    background:var(--cover);
    color:var(--gold);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.cover-inner{
    border:1px solid rgba(214,164,143,.4);
    border-radius:18px;
    padding:30px;
    width:88%;
    height:88%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.cover-title{
    font-family:'Great Vibes',cursive;
    font-size:60px;
}

.cover-sub{
    margin-top:20px;
    opacity:.8;
}

.final{
    font-family:'Great Vibes',cursive;
    font-size:44px;
    text-align:center;
}

</style>
</head>

<body>

<div class="bg">
    <div class="blur"></div>
    <div class="blur"></div>
</div>

<div class="screen" id="s1">
    <div class="login">
        <div class="title">For my baby</div>
        <div class="subtitle">OUR STORY</div>
        <button onclick="go()">Открыть</button>
    </div>
</div>

<div class="screen hidden" id="s2">
    <div class="login">
        <div class="title">Secret</div>
        <div class="subtitle">ДДММГГ</div>
        <input id="pass" type="password">
        <button onclick="check()">Войти</button>
        <p id="err"></p>
    </div>
</div>

<div class="screen hidden" id="s3">
    <div class="book">

        <div class="page cover active">
            <div class="cover-inner">
                <div class="cover-title">Diary of Love</div>
                <div class="cover-sub">Seven Months</div>
                <button onclick="next()">Читать</button>
            </div>
        </div>

        <div id="pages"></div>

        <div class="page">
            <div class="page-text">
                <div class="final">С любовью,<br>твой мальчик 🤍</div>
            </div>
            <div class="bottom">
                <button onclick="prev()" class="arrow">‹</button>
            </div>
        </div>

    </div>
</div>

<script>

const texts = [
"Нам 7 месяцев, не могу в это поверить. И вроде бы это просто цифра, но если честно, внутри ощущается так, будто мы прожили намного больше, чем половину года. Это уже не про время, это про нас. Про всё, что между нами было, про эмоции, про ссоры, про примирения, про моменты, когда мы почти ломались, но всё равно оставались друг у друга.",
"Мы не идеальные. И даже близко нет. У нас были ссоры, иногда очень тяжёлые, когда слова могли ранить, когда тишина длилась слишком долго, когда казалось, что мы на грани. Но потом происходило одно и то же. Мы скучали. И вот это чувство всегда было сильнее гордости, сильнее обид, сильнее любых эмоций.",
"Мы возвращались друг к другу. И каждый раз это было как будто заново, но уже глубже. Я помню наши обнимашки у кресента...",
"Это было как будто весь мир на секунду перестал существовать...",
"И когда я поцеловал ручки моей малюськи...",
"Или те обнимашки в подъезде математики...",
"И ещё те обнимашки перед Ляман...",
"И наши поцелуи. Щёчки, ручки, голова...",
"Когда я целую тебя, это не просто жест...",
"Ты для меня человек, с которым спокойно по-настоящему...",
"Я правда горжусь тобой...",
"И я иногда даже ловлю себя на мысли, что могу гордиться тем, что я именно твой парень...",
"Мне кажется, никто никогда не показывал мне столько любви...",
"Даже когда мы ссоримся...",
"Дом, жизнь, свадьба...",
"Я не идеален...",
"Я верю в нас 🤍"
];

let current=0;

function render(){
    const container=document.getElementById('pages');
    container.innerHTML='';
    texts.forEach((t,i)=>{
        const d=document.createElement('div');
        d.className='page';
        d.innerHTML=`
            <div class="page-text">${t}</div>
            <div class="bottom">
                <button class="arrow" onclick="prev()">‹</button>
                <div class="counter">${i+1}/${texts.length}</div>
                <button class="arrow" onclick="next()">›</button>
            </div>`;
        container.appendChild(d);
    });
    update();
}

function update(){
    document.querySelectorAll('.page').forEach((p,i)=>{
        p.classList.toggle('active',i===current);
    });
}

function next(){if(current<texts.length)current++,update();}
function prev(){if(current>0)current--,update();}

function go(){document.getElementById('s1').classList.add('hidden');document.getElementById('s2').classList.remove('hidden');}

function check(){
    if(document.getElementById('pass').value==='201025'){
        document.getElementById('s2').classList.add('hidden');
        document.getElementById('s3').classList.remove('hidden');
        render();
    }else{
        document.getElementById('err').innerText='Неверная дата';
    }
}

</script>

</body>
</html>
