<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Seven Months</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cover-bg: #1a1412;
            --gold: #d4a391;
            --page-bg: #fffcf9;
            --text-dark: #3d302d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            height: 100dvh;
            background: #0f0a09;
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        .bg-particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1412 0%, #000 100%);
            z-index: -2;
        }

        #bg-flow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .flow-item {
            position: absolute;
            color: rgba(212, 163, 145, 0.4); 
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            white-space: nowrap;
            user-select: none;
            will-change: transform;
            font-weight: 500;
        }

        .screen {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
            transition: opacity 0.6s ease;
        }

        .hidden { opacity: 0; pointer-events: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 40px 30px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 22px;
            background: #fff;
            color: #000;
            outline: none;
        }

        .btn-entry {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: var(--gold);
            color: white;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
        }

        .book-wrapper {
            width: 100%;
            max-width: 380px;
            height: 85dvh;
            position: relative;
        }

        .page {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 20px;
            padding: 40px 25px;
            display: none;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            background: var(--page-bg);
            color: var(--text-dark);
        }

        .page.active { display: flex; animation: pageIn 0.5s ease-out; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .page-cover {
            background: var(--cover-bg);
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--gold);
            justify-content: center; align-items: center; text-align: center;
            border: 1px solid rgba(212, 163, 145, 0.3);
        }
        
        .gold-embossing {
            border: 1px solid var(--gold);
            padding: 40px 15px;
            width: 90%; height: 90%;
            display: flex; flex-direction: column; justify-content: center;
            border-radius: 10px;
        }

        .text-box {
            font-size: 19px;
            line-height: 1.6;
            font-style: italic;
            flex-grow: 1;
            display: flex; flex-direction: column; justify-content: center; text-align: center;
        }

        .nav-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; min-height: 60px;
        }

        .arrow-btn {
            background: none; border: none;
            color: var(--text-dark);
            font-size: 35px;
            cursor: pointer; padding: 10px; width: 50px;
        }

        .timer-val { 
            font-weight: 600; color: #8e6d5d; font-size: 14px; 
            text-align: center; flex: 1;
        }

        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 34px; margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="bg-particles"></div>
    <div id="bg-flow"></div>

    <div id="scr1" class="screen">
        <div class="glass-card">
            <h1 style="font-family: 'Great Vibes'; font-size: 40px; color: var(--gold); margin-bottom: 20px;">For my baby</h1>
            <button class="btn-entry" onclick="go('scr1', 'scr2')">Открыть</button>
        </div>
    </div>

    <div id="scr2" class="screen hidden">
        <div class="glass-card">
            <h1 style="font-family: 'Great Vibes'; font-size: 35px; color: var(--gold); margin-bottom: 20px;">Secret</h1>
            <input type="password" id="pass" placeholder="ДДММГГ" inputmode="numeric">
            <button class="btn-entry" onclick="check()">Войти</button>
            <p id="err" style="color: var(--gold); margin-top: 15px; font-size: 14px;"></p>
        </div>
    </div>

    <div id="scr3" class="screen hidden">
        <div class="book-wrapper">
            <div class="page page-cover active" id="p0">
                <div class="gold-embossing" id="bookCover">
                    <p style="letter-spacing: 5px; opacity: 0.7; font-size: 12px;">MEMORIES</p>
                    <h1 style="font-size: 52px; font-family: 'Great Vibes';">Diary of Love</h1>
                    <p style="margin-top: 25px; font-size: 16px; opacity: 0.8;">Seven Months</p>
                    <button class="btn-entry" style="margin-top: 40px; max-width: 160px; align-self: center;" onclick="nextPage()">Читать</button>
                </div>
            </div>

            <div id="dynamicPages"></div>

            <div class="page" id="pFinal">
                <div class="text-box">
                    <div class="signature">С любовью,<br>твой маленький мальчик!</div>
                </div>
                <div class="nav-controls" style="justify-content: center;">
                    <button class="arrow-btn" onclick="prevPage()">&#8249;</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const texts = [
            "Нам 7 месяцев, не могу в это поверить. И вроде бы это просто цифра, но если честно, внутри ощущается так, будто мы прожили намного больше, чем половину года. Это уже не про время, это про нас. Про всё, что между нами было, про эмоции, про ссоры, про примирения, про моменты, когда мы почти ломались, но всё равно оставались друг у друга.",
            "Мы не идеальные. И даже близко нет. У нас были ссоры, иногда очень тяжёлые, когда слова могли ранить, когда тишина длилась слишком долго, когда казалось, что мы на грани. Но потом происходило одно и то же. Мы скучали. И вот это чувство всегда было сильнее гордости, сильнее обид, сильнее любых эмоций.",
            "Мы возвращались друг к другу. И каждый раз это было как будто заново, но уже глубже. Я помню наши обнимашки. И если честно, это отдельная часть нашей истории, которую невозможно перепутать ни с чем другим. У кресента. Это не было просто «мы встретились и обнялись».",
            "Это было как будто весь мир на секунду перестал существовать. Ты пришла с переживаниями, с волнением, с внутренним страхом, но ты всё равно была рядом. И в тот момент, когда мы обнялись, это было ощущение, что время остановилось. Что нет людей вокруг, нет шума, нет проблем. Только ты и я.",
            "И когда я поцеловал ручки моей малюськи, это было не просто так. Это было как очень бережный, почти трепетный жест, будто в этот момент ты для меня самое ценное, что есть. В этих поцелуях было всё — забота, нежность, и то чувство, когда человек настолько важен, что любое прикосновение становится особенным.",
            "Или те обнимашки в подъезде математики. Когда всё получилось буквально в последний момент. Я успел приехать, и в ту секунду, когда ты оказалась в моих руках, это было ощущение, что всё стало на свои места. Очень быстро, очень живо, но при этом так тепло, что до сих пор помнится.",
            "И ещё те обнимашки перед ляман. Мы обнимались, а она там так удивилась. Мы потом это обсуждали) даже само объятие всё равно было настоящим, живым, немного неловким, но очень нашим. И наши поцелуи. Щёчки, ручки, голова... Каждый такой момент для меня как маленькое тепло, которое остаётся внутри надолго.",
            "Когда я целую тебя, это не просто жест, это как тихое «ты мне важна» без слов. Когда поцеловал твои ручки после обнимашек, это ощущается как что-то очень бережное, как будто я пытаюсь передать всё, что чувствую, но не всегда умею сказать. Даже поцелуи в голову, мягкие, спокойные, они всегда дают ощущение уюта, будто в этот момент всё правильно.",
            "И знаешь, всё это не про идеальные отношения. Да, идеальных отношений как в кино не существует. Но нам это и не нужно. Потому что у нас есть реальность. Настоящая. Иногда сложная, иногда эмоциональная, но живая. И самое главное, в этой реальности мы всегда возвращаемся друг к другу. Даже если меньше общаемся.",
            "Даже если ссоримся. Даже если усталость или обиды между нами. Мы всё равно не отпускаем. И с каждым таким моментом мы становимся ближе. Ты для меня человек, с которым спокойно по-настоящему. Не просто приятно, а именно спокойно. С тобой я могу быть собой, без попыток казаться лучше.",
            "Со всеми своими ошибками, эмоциями, ревностью, странностями, тем, что иногда сам в себе не понимаю. И ты всё это видела. И всё равно осталась рядом. И это, бин, самое ценное. Я правда очень ценю тебя. И иногда мне даже стыдно за свои поступки, за моменты, когда я делаю тебе больно или веду себя не так. Но ты всё равно не уходишь.",
            "Ты остаёшься. И мы не ломаемся, а пытаемся говорить, понимать, исправлять. Если вспомнить конец декабря и январь, это был очень важный период для нас. Мы тогда реально могли потеряться. Было непонимание, напряжение, ощущение, что всё рушится. Но мы не отпустили. Мы остались. И прошли через это.",
            "И именно тогда стало понятно, что это не просто эмоции, а что-то, что мы держим осознанно. Сейчас мы уже другие. Не идеальные, но более настоящие. Мы умеем говорить. Пусть не всегда сразу, пусть не всегда легко, но мы стараемся понимать друг друга. И это огромный шаг вперёд.",
            "И даже то, что мы иногда меньше общаемся сейчас, не уменьшает то, что между нами есть. Потому что основа не в количестве сообщений, а в том, что мы друг для друга значим. Иногда я думаю о будущем. Уже не как о далёкой мечте, а как о чём-то, что мы реально обсуждаем.",
            "Дом, жизнь, свадьба, обычные дни вместе, когда не нужно ничего доказывать, когда есть просто «мы». И это уже не кажется фантазией. Это кажется дорогой, по которой мы идём. Я не идеален. Я это знаю. Я могу ошибаться, могу перегибать, могу не всегда правильно выражать себя.",
            "Но ты всё равно рядом, и я это не воспринимаю как должное. Я понимаю, что это выбор. И я очень стараюсь быть достойным этого выбора. Нам 7 месяцев. Но ощущение такое, будто это только начало большой истории. И если это начало, то я не хочу терять то, что у нас есть. Я верю в нас."
        ];

        let currentPage = 0;
        const totalPages = texts.length + 2;
        const words = ["E🤍", "forever"];
        const flowContainer = document.getElementById('bg-flow');

        function createFlowItem() {
            const item = document.createElement('div');
            item.className = 'flow-item';
            item.innerText = words[Math.floor(Math.random() * words.length)];
            const startX = Math.random() * (window.innerWidth - 80);
            const size = 20 + Math.random() * 15;
            item.style.left = startX + 'px';
            item.style.fontSize = size + 'px';
            item.style.top = '-50px';
            flowContainer.appendChild(item);
            const animation = item.animate([
                { transform: 'translateY(0)' },
                { transform: `translateY(${window.innerHeight + 100}px)` }
            ], {
                duration: 12000,
                easing: 'linear'
            });
            animation.onfinish = () => { item.remove(); };
        }

        setInterval(createFlowItem, 1500);

        function go(f, t) {
            document.getElementById(f).classList.add('hidden');
            document.getElementById(t).classList.remove('hidden');
        }

        function check() {
            if(document.getElementById('pass').value === '201025') {
                if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                buildPages();
                go('scr2', 'scr3');
                updateTimer();
                setInterval(updateTimer, 1000);
            } else {
                document.getElementById('err').innerText = "Неверная дата, балам";
            }
        }

        function buildPages() {
            const container = document.getElementById('dynamicPages');
            container.innerHTML = '';
            texts.forEach((text, i) => {
                const div = document.createElement('div');
                div.className = 'page';
                div.id = `p${i+1}`;
                div.innerHTML = `
                    <div class="text-box">${text}</div>
                    <div class="nav-controls">
                        <button class="arrow-btn" onclick="prevPage()">&#8249;</button>
                        <span class="timer-val global-timer">...</span>
                        <button class="arrow-btn" onclick="nextPage()">&#8250;</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function nextPage() {
            if(currentPage < totalPages - 1) { currentPage++; updatePage(); }
        }

        function prevPage() {
            if(currentPage > 0) { currentPage--; updatePage(); }
        }

        function updatePage() {
            if (navigator.vibrate) navigator.vibrate(20);
            document.querySelectorAll('.page').forEach((p, i) => {
                p.classList.toggle('active', i === currentPage);
            });
        }

        function updateTimer() {
            const startDate = new Date('2025-10-20T22:47:00');
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            const timerStr = `${days}д ${hours}ч ${mins}м ${secs}с`;
            document.querySelectorAll('.global-timer').forEach(el => el.innerText = timerStr);
        }

        window.addEventListener('deviceorientation', (e) => {
            const cover = document.getElementById('bookCover');
            if(!cover) return;
            const x = Math.min(Math.max(e.beta, -15), 15) / 2;
            const y = Math.min(Math.max(e.gamma, -15), 15) / 2;
            cover.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
        });
    </script>
</body>
</html>
