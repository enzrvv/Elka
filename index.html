<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>E + E</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:
    radial-gradient(circle at top,#5b3a33,#1e1513 70%);
    font-family:'Cormorant Garamond', serif;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* GLOW */

.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,190,150,0.08);
    filter:blur(80px);
    border-radius:50%;
    animation:float 6s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-20px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* SCREENS */

.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:1s;
    padding:20px;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

/* INTRO */

.intro-card,
.password-card{
    width:100%;
    max-width:360px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:32px;
    padding:40px 28px;
    text-align:center;
    box-shadow:
    0 10px 40px rgba(0,0,0,0.35),
    inset 0 0 20px rgba(255,255,255,0.03);
}

.intro-card h1,
.password-card h1{
    font-family:'Great Vibes', cursive;
    font-size:60px;
    color:#f8d7c7;
    margin-bottom:12px;
}

.intro-card p,
.password-card p{
    font-size:22px;
    line-height:1.5;
    color:#f5e7df;
    margin-bottom:30px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#d7a38f,#b87c66);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    font-family:'Cormorant Garamond', serif;
}

button:active{
    transform:scale(0.97);
}

input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:18px;
    margin-bottom:20px;
    background:rgba(255,255,255,0.08);
    color:white;
    text-align:center;
    font-size:18px;
}

input::placeholder{
    color:rgba(255,255,255,0.6);
}

.error{
    margin-top:15px;
    color:#ffb0b0;
    font-size:18px;
}

/* BOOK */

.book-container{
    perspective:2500px;
}

.book{
    position:relative;
    width:90vw;
    max-width:380px;
    height:78vh;
    max-height:680px;
    transform-style:preserve-3d;
}

/* COVER */

.cover{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:28px;

    background:
    linear-gradient(145deg,#8b5e4f,#5b3a33);

    box-shadow:
    0 30px 60px rgba(0,0,0,0.45),
    inset 0 0 30px rgba(255,255,255,0.05);

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    cursor:pointer;

    transform-origin:left;
    transition:1.8s ease;
    z-index:10;
}

.cover::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 2px,
        transparent 2px,
        transparent 6px
    );
    opacity:0.3;
}

.cover::after{
    content:"";
    position:absolute;
    width:140%;
    height:140%;
    background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 60%);
    top:-20%;
    left:-20%;
}

.cover h1{
    font-family:'Great Vibes', cursive;
    font-size:90px;
    color:#fff5ef;
    z-index:2;
    text-shadow:0 0 20px rgba(255,255,255,0.15);
}

.cover p{
    z-index:2;
    margin-top:10px;
    letter-spacing:5px;
    color:#f5d8cb;
    font-size:18px;
}

.book.open .cover{
    transform:rotateY(-160deg);
}

/* PAGES */

.pages{
    position:absolute;
    width:100%;
    height:100%;
    background:#fffaf5;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
    padding:38px 28px;
}

.page{
    display:none;
    height:100%;
    color:#4b352e;
    animation:fade 0.5s ease;
}

.page.active{
    display:block;
}

.page h2{
    font-size:36px;
    margin-bottom:20px;
    color:#8b5e4f;
}

.page p{
    font-size:24px;
    line-height:1.8;
}

/* BUTTONS */

.buttons{
    position:absolute;
    bottom:25px;
    left:28px;
    right:28px;
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.buttons button{
    width:48%;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateX(20px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }

}

</style>
</head>

<body>

<div class="glow"></div>

<!-- INTRO -->

<div class="screen" id="introScreen">

    <div class="intro-card">

        <h1>Welcome</h1>

        <p>
            Welcome to the Love Diary
        </p>

        <button onclick="goToPassword()">
            Continue
        </button>

    </div>

</div>

<!-- PASSWORD -->

<div class="screen hidden" id="passwordScreen">

    <div class="password-card">

        <h1>Password</h1>

        <p>
            Enter the secret password
        </p>

        <input
        type="password"
        id="passwordInput"
        placeholder="Password">

        <button onclick="checkPassword()">
            Open Diary
        </button>

        <div class="error" id="errorText"></div>

    </div>

</div>

<!-- BOOK -->

<div class="screen hidden" id="bookScreen">

    <div class="book-container">

        <div class="book" id="book">

            <div class="cover" onclick="openBook()">

                <h1>E + E</h1>

                <p>LOVE DIARY</p>

            </div>

            <div class="pages">

                <!-- PAGE 1 -->

                <div class="page active">

                    <h2>Page 1</h2>

                    <p>
                        WRITE YOUR TEXT HERE
                    </p>

                </div>

                <!-- PAGE 2 -->

                <div class="page">

                    <h2>Page 2</h2>

                    <p>
                        WRITE YOUR TEXT HERE
                    </p>

                </div>

                <!-- PAGE 3 -->

                <div class="page">

                    <h2>Page 3</h2>

                    <p>
                        WRITE YOUR TEXT HERE
                    </p>

                </div>

                <div class="buttons">

                    <button onclick="prevPage()">
                        Previous
                    </button>

                    <button onclick="nextPage()">
                        Next
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const introScreen = document.getElementById("introScreen");
const passwordScreen = document.getElementById("passwordScreen");
const bookScreen = document.getElementById("bookScreen");

const passwordInput = document.getElementById("passwordInput");
const errorText = document.getElementById("errorText");

const book = document.getElementById("book");
const pages = document.querySelectorAll(".page");

let currentPage = 0;

function goToPassword(){

    introScreen.classList.add("hidden");

    setTimeout(() => {

        passwordScreen.classList.remove("hidden");

    },500);

}

function checkPassword(){

    if(passwordInput.value === "201025"){

        passwordScreen.classList.add("hidden");

        setTimeout(() => {

            bookScreen.classList.remove("hidden");

        },500);

    }else{

        errorText.innerText = "Wrong password";

    }

}

function openBook(){

    book.classList.add("open");

}

function showPage(index){

    pages.forEach(page => {

        page.classList.remove("active");

    });

    pages[index].classList.add("active");

}

function nextPage(){

    if(currentPage < pages.length - 1){

        currentPage++;

        showPage(currentPage);

    }

}

function prevPage(){

    if(currentPage > 0){

        currentPage--;

        showPage(currentPage);

    }

}

</script>

</body>
</html>
